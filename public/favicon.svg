<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2050/svg">
  <defs>
    <!-- Background Gradient: Deep soft Indigo to Vibrant Sky/Cyan Blue -->
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4C4DFC" />
      <stop offset="40%" stop-color="#3F6CF0" />
      <stop offset="100%" stop-color="#0CA6F8" />
    </linearGradient>

    <!-- Base band Gradient with translucent glassmorphic look -->
    <linearGradient id="cap-base-grad" x1="122" y1="250" x2="382" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#C2E6FF" stop-opacity="0.75" />
    </linearGradient>
  </defs>

  <!-- iOS-style Squircle background -->
  <rect width="512" height="512" rx="116" fill="url(#bg-gradient)" />

  <!-- Semi-transparent stylized glass Cap Base Band -->
  <path d="M 124 250 L 256 295 L 382 250 V 315 Q 256 372 124 315 Z" fill="url(#cap-base-grad)" />

  <!-- Minimal premium fully-white Graduation Cap Top Plate and Tassel -->
  <path d="M 256 125 L 96 205 L 256 285 L 382 222 V 330 H 412 V 205 L 256 125 Z" fill="#FFFFFF" />
</svg>
